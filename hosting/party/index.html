<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join My Nom Nominate Party!</title>

  <!-- Open Graph for rich link previews -->
  <meta property="og:title" content="You're Invited to a Nom Nominate Party!" />
  <meta property="og:description" content="Swipe on restaurants together and find the perfect place to eat. Tap to join!" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-party.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="You're Invited to a Nom Nominate Party!" />
  <meta name="twitter:description" content="Swipe on restaurants together and find the perfect place to eat." />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #FF6B35, #ff9a5c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .open-btn {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B35, #e55a2b);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 16px 48px;
      border-radius: 16px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
    }
    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255, 107, 53, 0.5);
    }
    .open-btn:active { transform: translateY(0); }
    .open-btn.disabled {
      opacity: 0.6;
      pointer-events: none;
    }
    .store-link {
      display: block;
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      text-decoration: none;
    }
    .store-link:hover { color: rgba(255, 255, 255, 0.8); }
    .divider {
      margin: 24px 0;
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
    }
    .feature {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .feature-icon { font-size: 24px; }
    #status {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      min-height: 20px;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🍽️</div>
    <h1>You're Invited!</h1>
    <p class="subtitle">
      Your friend wants you to join their<br />
      <strong>Nom Nominate</strong> dinner party.<br />
      Swipe on restaurants and pick the winner together!
    </p>

    <button class="open-btn" id="openBtn" onclick="openApp()">
      Open in App
    </button>

    <a class="store-link" id="storeLink" href="https://play.google.com/store/apps/details?id=com.nomnominate.app">
      Don't have the app? Get it on Google Play
    </a>

    <p id="status"></p>

    <hr class="divider" />

    <div class="features">
      <div class="feature">
        <span class="feature-icon">👆</span>
        Swipe
      </div>
      <div class="feature">
        <span class="feature-icon">🗳️</span>
        Vote
      </div>
      <div class="feature">
        <span class="feature-icon">🏆</span>
        Decide
      </div>
    </div>
  </div>

  <script>
    // Extract party ID from URL: /party/?id=abc123 or /party/abc123
    function getPartyId() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('id')) return params.get('id');

      var pathMatch = window.location.pathname.match(/\/party\/([^/?]+)/);
      if (pathMatch) return pathMatch[1];

      return null;
    }

    var partyId = getPartyId();
    var webLink = partyId
      ? 'https://nom-nominate.web.app/party/' + partyId
      : 'https://nom-nominate.web.app';
    var deepLink = partyId
      ? 'nomnominate://party/' + partyId
      : 'nomnominate://';
    var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.nomnominate.app';

    var isOpening = false;

    function openApp() {
      if (isOpening) return;
      isOpening = true;

      var status = document.getElementById('status');
      var btn = document.getElementById('openBtn');
      status.innerHTML = '<span class="spinner"></span> Opening Nom Nominate...';
      btn.classList.add('disabled');

      // Try the Android App Link first (https:// URL that Android
      // should intercept if assetlinks.json verification passed).
      // Fall back to custom scheme for older Android or unverified state.
      var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      var isAndroid = /Android/i.test(navigator.userAgent);

      if (isAndroid) {
        // Use intent:// scheme which is more reliable than custom schemes
        // on Android — it provides a fallback URL in the intent itself.
        var intentUrl = 'intent://party/' + (partyId || '') +
          '#Intent;scheme=nomnominate;package=com.nomnominate.app;' +
          'S.browser_fallback_url=' + encodeURIComponent(playStoreUrl) + ';end';
        window.location.href = intentUrl;
      } else {
        // iOS or other — use custom scheme
        window.location.href = deepLink;
      }

      // Reset the button after a few seconds so the user can try again
      setTimeout(function() {
        isOpening = false;
        btn.classList.remove('disabled');
        btn.textContent = 'Try Again — Open in App';
        status.textContent = 'Didn\'t open? Tap the button above to try again.';
      }, 3000);
    }

    // When user returns to this tab (e.g. after the app opened and they
    // switched back), reset the UI so they can try again if needed.
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        isOpening = false;
        var btn = document.getElementById('openBtn');
        var status = document.getElementById('status');
        btn.classList.remove('disabled');
        btn.textContent = 'Open in App';
        status.textContent = '';
      }
    });

    // Auto-attempt to open the app on mobile after a brief delay
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile && partyId) {
      setTimeout(openApp, 800);
    }
  </script>
</body>
</html>
