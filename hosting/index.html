<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nom Nominate - Decide Where to Eat, Together</title>
  <meta name="description" content="Swipe on restaurants with your friends and find the perfect place to eat. No more endless 'where do you want to go?' debates." />
  <meta property="og:title" content="Nom Nominate" />
  <meta property="og:description" content="Swipe on restaurants with your friends. No more endless debates about where to eat." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .hero { max-width: 480px; }
    .logo { font-size: 72px; margin-bottom: 16px; }
    h1 { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
    .brand { color: #FF6B35; }
    .tagline { font-size: 18px; color: rgba(255,255,255,0.6); margin-bottom: 32px; line-height: 1.5; }
    .cta {
      display: inline-block;
      background: #FF6B35;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 16px 48px;
      border-radius: 16px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">🍽️</div>
    <h1><span class="brand">Nom Nominate</span></h1>
    <p class="tagline">Swipe on restaurants with friends.<br />Find the perfect place to eat, together.</p>
    <a class="cta" href="https://play.google.com/store/apps/details?id=com.nomnominate.app">
      Get the App
    </a>
  </div>
</body>
</html>
